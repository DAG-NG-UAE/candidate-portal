name: Deploy to Production

on:
  push:
    branches:
      - master

permissions:
  id-token: write  # Required for OIDC authentication with AWS
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # API base URL injected at build time so it's baked into the static bundle.
          # Next.js replaces process.env.NEXT_PUBLIC_* at build time — the value must
          # be available here, not at runtime.
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: af-south-1

      # Sync immutable assets first with a long cache lifetime.
      # _next/static/* filenames are content-hashed by Next.js, so a new build
      # always produces new filenames — old hashes are never reused.
      - name: Sync immutable static assets (long cache)
        run: |
          aws s3 sync out/_next/static s3://${{ secrets.S3_BUCKET_NAME }}/_next/static \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      # Sync everything else (HTML pages, public/ assets, etc.) with no-cache so
      # browsers always fetch the latest version after a deploy.
      - name: Sync remaining files (no cache)
        run: |
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --cache-control "public, no-cache, no-store, must-revalidate" \
            --delete \
            --exclude "_next/static/*"

      # Invalidate CloudFront so edge caches serve the freshly synced files
      # immediately. Targets /* so all paths are purged in one invalidation.
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
